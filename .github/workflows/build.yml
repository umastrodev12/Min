name: Min Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Install dependencies
      run: go mod tidy

    - name: Build Windows EXE
      run: |
        GOOS=windows GOARCH=amd64 go build -v -o Min.exe .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Min-Launcher-Windows
        path: Min.exe
